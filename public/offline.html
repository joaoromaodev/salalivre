<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sem conexão — SalaLivre</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #ffffff;
        color: #18181b;
        padding: 24px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0a0a0a; color: #fafafa; }
      }
      .card { max-width: 22rem; text-align: center; }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { margin: 0; color: #71717a; line-height: 1.5; }
      .dot { width: 12px; height: 12px; border-radius: 999px; background: #4f46e5; display: inline-block; margin-bottom: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="dot"></span>
      <h1>Você está sem conexão</h1>
      <p>O SalaLivre precisa de internet para consultar a agenda. Verifique sua conexão e tente novamente.</p>
    </div>
  </body>
</html>
